<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 250" font-family="-apple-system, Segoe UI, Helvetica, Arial, sans-serif">
  <rect x="0" y="0" width="900" height="250" fill="#0d1117"/>

  <text x="40" y="40" font-size="20" font-weight="700" fill="#e6edf3">No stage runs your program</text>
  <text x="40" y="64" font-size="13" fill="#8b949e">From your source to the native spec, and not one stage executes your code.</text>

  <!-- boxes -->
  <!-- 1 TypeScript source -->
  <rect x="30" y="100" width="180" height="80" rx="8" fill="#161b22" stroke="#3fb950" stroke-opacity="0.7" stroke-width="1.5"/>
  <text x="120" y="135" font-size="15" font-weight="700" fill="#68d391" text-anchor="middle">TypeScript</text>
  <text x="120" y="156" font-size="11" fill="#8b949e" text-anchor="middle">your source</text>

  <!-- 2 Parse + lint -->
  <rect x="250" y="100" width="180" height="80" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <text x="340" y="131" font-size="15" font-weight="700" fill="#e6edf3" text-anchor="middle">Parse + lint</text>
  <text x="340" y="152" font-size="10.5" fill="#8b949e" text-anchor="middle">AST &#183; type-check &#183; EVL</text>
  <text x="340" y="202" font-size="10.5" fill="#6e7681" text-anchor="middle">in your editor, via the LSP</text>

  <!-- 3 Compile -->
  <rect x="470" y="100" width="180" height="80" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <text x="560" y="131" font-size="15" font-weight="700" fill="#e6edf3" text-anchor="middle">Compile</text>
  <text x="560" y="152" font-size="10.5" fill="#8b949e" text-anchor="middle">static evaluation</text>
  <text x="560" y="202" font-size="10.5" fill="#6e7681" text-anchor="middle">folds constants, no run</text>

  <!-- 4 Native spec -->
  <rect x="690" y="100" width="180" height="80" rx="8" fill="#161b22" stroke="#3fb950" stroke-opacity="0.7" stroke-width="1.5"/>
  <text x="780" y="135" font-size="15" font-weight="700" fill="#68d391" text-anchor="middle">Native spec</text>
  <text x="780" y="156" font-size="11" fill="#8b949e" text-anchor="middle">what ships</text>

  <!-- arrows -->
  <g stroke="#6e7681" stroke-width="1.5" fill="#6e7681">
    <line x1="212" y1="140" x2="244" y2="140"/>
    <polygon points="244,135 250,140 244,145" stroke="none"/>
    <line x1="432" y1="140" x2="464" y2="140"/>
    <polygon points="464,135 470,140 464,145" stroke="none"/>
    <line x1="652" y1="140" x2="684" y2="140"/>
    <polygon points="684,135 690,140 684,145" stroke="none"/>
  </g>

  <text x="40" y="238" font-size="11" fill="#6e7681">The lint is the same static pass your editor runs. The compile folds your source to the spec. Nothing here reaches the outside world.</text>
</svg>
