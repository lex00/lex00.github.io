<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 470" font-family="-apple-system, Segoe UI, Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="pcost" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#68d391"/>
      <stop offset="0.5" stop-color="#ffc700"/>
      <stop offset="1" stop-color="#f56565"/>
    </linearGradient>
    <marker id="parrow" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#c9d1d9"/>
    </marker>
  </defs>

  <text x="40" y="42" font-size="22" font-weight="700" fill="#e6edf3">Where each policy runs</text>
  <text x="40" y="66" font-size="13" fill="#8b949e">The Terraform pipeline, left to right. Policy that runs earlier is cheaper.</text>

  <!-- platform zone shading + boundary -->
  <rect x="392" y="150" width="466" height="150" fill="#ffc700" fill-opacity="0.05"/>
  <line x1="392" y1="150" x2="392" y2="300" stroke="#ffc700" stroke-width="1.5" stroke-dasharray="4 3"/>
  <text x="392" y="143" font-size="11" fill="#e0b84a" text-anchor="middle" font-weight="600">HCP + credentials</text>

  <!-- chant lane (far left, offline) -->
  <text x="134" y="167" font-size="12" fill="#7ee0a3" font-weight="600" text-anchor="middle">chant policy — typed, offline</text>
  <line x1="70" y1="178" x2="198" y2="178" stroke="#68d391" stroke-width="4"/>
  <circle cx="70" cy="178" r="5" fill="#68d391"/><circle cx="198" cy="178" r="5" fill="#68d391"/>

  <!-- tfpolicy lane (pre-plan → apply, in HCP) -->
  <text x="582" y="202" font-size="12" fill="#fa984a" font-weight="600" text-anchor="middle">tfpolicy — HCL, in HCP</text>
  <line x1="455" y1="213" x2="710" y2="213" stroke="#fa984a" stroke-width="4"/>
  <circle cx="455" cy="213" r="5" fill="#fa984a"/><circle cx="582" cy="213" r="5" fill="#fa984a"/><circle cx="710" cy="213" r="5" fill="#fa984a"/>

  <!-- sentinel / opa lane (plan → apply) -->
  <text x="646" y="237" font-size="11.5" fill="#9aa0a8" text-anchor="middle">Sentinel · OPA — separate language</text>
  <line x1="582" y1="248" x2="710" y2="248" stroke="#8b949e" stroke-width="3"/>
  <circle cx="582" cy="248" r="4.5" fill="#8b949e"/><circle cx="710" cy="248" r="4.5" fill="#8b949e"/>

  <!-- axis -->
  <line x1="70" y1="290" x2="858" y2="290" stroke="url(#pcost)" stroke-width="6" marker-end="url(#parrow)"/>
  <text x="70" y="322" font-size="12" fill="#68d391" font-weight="600">you author</text>
  <text x="858" y="322" font-size="12" fill="#f56565" font-weight="600" text-anchor="end">incident</text>

  <!-- stations -->
  <g font-size="12" fill="#e6edf3" text-anchor="middle">
    <g><circle cx="70"  cy="290" r="5" fill="#68d391"/><text x="70"  y="356">Editor</text></g>
    <g><circle cx="198" cy="290" r="5" fill="#74cf86"/><text x="198" y="356">Build</text></g>
    <g><circle cx="326" cy="290" r="5" fill="#b5c24a"/><text x="326" y="356">Commit / CI</text></g>
    <g><circle cx="455" cy="290" r="5" fill="#ffc700"/><text x="455" y="356">Pre-plan</text></g>
    <g><circle cx="582" cy="290" r="5" fill="#fa984a"/><text x="582" y="356">Plan</text></g>
    <g><circle cx="710" cy="290" r="5" fill="#f56565"/><text x="710" y="356">Apply</text></g>
  </g>

  <!-- zone brackets -->
  <path d="M70,378 L326,378 M70,374 L70,382 M326,374 L326,382" stroke="#68d391" stroke-width="1.5"/>
  <text x="198" y="397" font-size="11.5" fill="#7ee0a3" text-anchor="middle">offline — typed, no platform</text>
  <path d="M455,378 L710,378 M455,374 L455,382 M710,374 L710,382" stroke="#e0b84a" stroke-width="1.5"/>
  <text x="582" y="397" font-size="11.5" fill="#e0b84a" text-anchor="middle">evaluated in HCP</text>

  <!-- footnote -->
  <text x="40" y="440" font-size="11" fill="#8b949e">tfpolicy reaches earlier (pre-plan) and later (apply) than Sentinel — but never left of the platform.</text>
</svg>
