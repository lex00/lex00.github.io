<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 456" font-family="-apple-system, Segoe UI, Helvetica, Arial, sans-serif">
  <rect x="0" y="0" width="900" height="456" fill="#0d1117"/>

  <text x="40" y="44" font-size="22" font-weight="700" fill="#e6edf3">An industry around one tool</text>
  <text x="40" y="68" font-size="13" fill="#8b949e">Count them. Every one keeps a state store. chant, off on its own, keeps none.</text>

  <!-- column headers -->
  <text x="290" y="104" font-size="11" font-weight="600" fill="#6e7681" letter-spacing="0.5">DOES WHAT</text>
  <text x="860" y="104" font-size="11" font-weight="600" fill="#6e7681" letter-spacing="0.5" text-anchor="end">OWN STATE STORE?</text>
  <line x1="40" y1="114" x2="860" y2="114" stroke="#30363d" stroke-width="1"/>

  <!-- FIX group -->
  <text x="40" y="142" font-size="13" font-weight="700" fill="#e0b84a">THE FIX INDUSTRY</text>
  <text x="196" y="142" font-size="11.5" fill="#b0894a">keep the store, make it hurt less</text>

  <text x="44" y="176" font-size="13.5" font-weight="600" fill="#c9d1d9">Terragrunt</text>
  <text x="290" y="176" font-size="12" fill="#8b949e">wraps it</text>
  <text x="860" y="176" font-size="12.5" fill="#adbac7" text-anchor="end">yes</text>

  <text x="44" y="208" font-size="13.5" font-weight="600" fill="#c9d1d9">TerraConstructs</text>
  <text x="290" y="208" font-size="12" fill="#8b949e">a typed object model over it</text>
  <text x="860" y="208" font-size="12.5" fill="#adbac7" text-anchor="end">yes</text>

  <text x="44" y="240" font-size="13.5" font-weight="600" fill="#c9d1d9">Atlantis &#183; Spacelift &#183; env0</text>
  <text x="290" y="240" font-size="12" fill="#8b949e">run it for you</text>
  <text x="860" y="240" font-size="12.5" fill="#adbac7" text-anchor="end">yes</text>

  <text x="44" y="272" font-size="13.5" font-weight="600" fill="#c9d1d9">Terraform Cloud</text>
  <text x="290" y="272" font-size="12" fill="#8b949e">hosts the store, gives you apply</text>
  <text x="860" y="272" font-size="12.5" fill="#adbac7" text-anchor="end">yes</text>

  <text x="44" y="304" font-size="13.5" font-weight="600" fill="#c9d1d9">Stategraph</text>
  <text x="290" y="304" font-size="12" fill="#8b949e">state as a dependency graph</text>
  <text x="860" y="304" font-size="12.5" fill="#adbac7" text-anchor="end">yes</text>

  <text x="44" y="336" font-size="13.5" font-weight="600" fill="#c9d1d9">compliance.tf</text>
  <text x="290" y="336" font-size="12" fill="#8b949e">guardrails on the modules</text>
  <text x="860" y="336" font-size="12.5" fill="#adbac7" text-anchor="end">yes</text>

  <!-- chant, set apart -->
  <line x1="40" y1="362" x2="860" y2="362" stroke="#21262d" stroke-width="1" stroke-dasharray="3 4"/>
  <text x="40" y="388" font-size="11" font-weight="600" fill="#6e7681" letter-spacing="0.5">NOT IN THE INDUSTRY</text>
  <rect x="34" y="400" width="830" height="42" rx="9" fill="#1a9850" fill-opacity="0.14" stroke="#1a9850" stroke-opacity="0.9" stroke-width="1.5"/>
  <text x="52" y="426" font-size="15" font-weight="700" fill="#7ee787">chant</text>
  <text x="290" y="426" font-size="12" fill="#adbac7">drives no raw API, reads the substrate</text>
  <text x="860" y="426" font-size="14" font-weight="700" fill="#7ee787" text-anchor="end">none</text>
</svg>
