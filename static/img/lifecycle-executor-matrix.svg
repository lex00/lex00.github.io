<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 495" font-family="-apple-system, Segoe UI, Helvetica, Arial, sans-serif">
  <rect x="0.5" y="0.5" width="719" height="494" rx="10" fill="#ffffff" stroke="#e6e6e6"/>
  <text x="40" y="42" font-size="22" font-weight="700" fill="#111">Who runs the step</text>
  <text x="40" y="62" font-size="13" fill="#666">Capabilities a day-two operation needs, and which model provides them.</text>
  <text x="490" y="100" font-size="11" font-weight="700" fill="#555" text-anchor="middle">Terraform Action</text>
  <text x="640" y="100" font-size="11" font-weight="700" fill="#1a7a45" text-anchor="middle">chant Op</text>
  <rect x="600" y="112" width="80" height="304" fill="#ecf7f0"/>
  <line x1="40" y1="108" x2="680" y2="108" stroke="#e2e2e2" stroke-width="1"/>

  <text x="54" y="135" font-size="12.5" fill="#333">Attaches to the lifecycle</text>
  <circle cx="490" cy="131" r="6.5" fill="#1a9850"/>
  <circle cx="640" cy="131" r="6.5" fill="#1a9850"/>
  <line x1="40" y1="150" x2="680" y2="150" stroke="#efefef" stroke-width="1"/>

  <text x="54" y="173" font-size="12.5" fill="#333">Typed input, checked before apply</text>
  <circle cx="490" cy="169" r="5.5" fill="none" stroke="#d0d0d0" stroke-width="1.6"/>
  <circle cx="640" cy="169" r="6.5" fill="#1a9850"/>
  <line x1="40" y1="188" x2="680" y2="188" stroke="#efefef" stroke-width="1"/>

  <text x="54" y="211" font-size="12.5" fill="#333">Any operation, not a provider list</text>
  <circle cx="490" cy="207" r="5.5" fill="none" stroke="#d0d0d0" stroke-width="1.6"/>
  <circle cx="640" cy="207" r="6.5" fill="#1a9850"/>
  <line x1="40" y1="226" x2="680" y2="226" stroke="#efefef" stroke-width="1"/>

  <text x="54" y="249" font-size="12.5" fill="#333">Retry and backoff</text>
  <circle cx="490" cy="245" r="5.5" fill="none" stroke="#d0d0d0" stroke-width="1.6"/>
  <circle cx="640" cy="245" r="6.5" fill="#1a9850"/>
  <line x1="40" y1="264" x2="680" y2="264" stroke="#efefef" stroke-width="1"/>

  <text x="54" y="287" font-size="12.5" fill="#333">Timeout</text>
  <circle cx="490" cy="283" r="5.5" fill="none" stroke="#d0d0d0" stroke-width="1.6"/>
  <circle cx="640" cy="283" r="6.5" fill="#1a9850"/>
  <line x1="40" y1="302" x2="680" y2="302" stroke="#efefef" stroke-width="1"/>

  <text x="54" y="325" font-size="12.5" fill="#333">Human gate before a destroy</text>
  <circle cx="490" cy="321" r="5.5" fill="none" stroke="#d0d0d0" stroke-width="1.6"/>
  <circle cx="640" cy="321" r="6.5" fill="#1a9850"/>
  <line x1="40" y1="340" x2="680" y2="340" stroke="#efefef" stroke-width="1"/>

  <text x="54" y="363" font-size="12.5" fill="#333">Durable record it ran</text>
  <circle cx="490" cy="359" r="5.5" fill="none" stroke="#d0d0d0" stroke-width="1.6"/>
  <circle cx="640" cy="359" r="6.5" fill="#1a9850"/>
  <line x1="40" y1="378" x2="680" y2="378" stroke="#efefef" stroke-width="1"/>

  <text x="54" y="401" font-size="12.5" fill="#333">Policy gate before it runs</text>
  <circle cx="490" cy="397" r="5.5" fill="none" stroke="#d0d0d0" stroke-width="1.6"/>
  <circle cx="640" cy="397" r="6.5" fill="#1a9850"/>
  <line x1="40" y1="416" x2="680" y2="416" stroke="#efefef" stroke-width="1"/>

  <text x="40" y="444" font-size="12" fill="#888">Everything under the first row is the same missing piece: an executor.</text>

  <circle cx="52" cy="470" r="6.5" fill="#1a9850"/><text x="64" y="474" font-size="11" fill="#777">yes</text>
  <circle cx="120" cy="470" r="5.5" fill="none" stroke="#d0d0d0" stroke-width="1.6"/><text x="132" y="474" font-size="11" fill="#777">no</text>
</svg>
