<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 510" font-family="-apple-system, Segoe UI, Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="cost" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#68d391"/>
      <stop offset="0.5" stop-color="#ffc700"/>
      <stop offset="1" stop-color="#f56565"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#c9d1d9"/>
    </marker>
  </defs>

  <text x="40" y="42" font-size="22" font-weight="700" fill="#e6edf3">Where each tool catches your mistake</text>
  <text x="40" y="66" font-size="13" fill="#8b949e">The infrastructure pipeline, left to right. Further left is cheaper.</text>

  <!-- chant callout (far left) -->
  <rect x="56" y="92" width="158" height="42" rx="8" fill="#1a9850"/>
  <text x="135" y="112" font-size="15" font-weight="700" fill="#fff" text-anchor="middle">chant</text>
  <text x="135" y="127" font-size="11" fill="#dff0e4" text-anchor="middle">types · lint · synthesis</text>
  <line x1="135" y1="134" x2="135" y2="283" stroke="#68d391" stroke-width="2" stroke-dasharray="4 3"/>

  <!-- preview cluster panel -->
  <rect x="338" y="86" width="234" height="132" rx="8" fill="#161b22" stroke="#e0b84a" stroke-width="1.5"/>
  <text x="455" y="106" font-size="12.5" font-weight="700" fill="#e0b84a" text-anchor="middle">needs a cloud / state API</text>
  <g font-size="11.5" fill="#c9d1d9">
    <text x="352" y="128">CloudFormation</text><text x="558" y="128" text-anchor="end" fill="#e0b84a">change set</text>
    <text x="352" y="146">Terraform</text>     <text x="558" y="146" text-anchor="end" fill="#e0b84a">plan</text>
    <text x="352" y="164">Azure Bicep</text>   <text x="558" y="164" text-anchor="end" fill="#e0b84a">what-if</text>
    <text x="352" y="182">GCP Deploy Mgr</text><text x="558" y="182" text-anchor="end" fill="#e0b84a">preview</text>
    <text x="352" y="200">Pulumi</text>        <text x="558" y="200" text-anchor="end" fill="#e0b84a">preview *</text>
  </g>
  <line x1="455" y1="218" x2="455" y2="283" stroke="#e0b84a" stroke-width="2" stroke-dasharray="4 3"/>

  <!-- axis -->
  <line x1="70" y1="290" x2="858" y2="290" stroke="url(#cost)" stroke-width="6" marker-end="url(#arrow)"/>
  <text x="70" y="322" font-size="12" fill="#68d391" font-weight="600">you type</text>
  <text x="858" y="322" font-size="12" fill="#f56565" font-weight="600" text-anchor="end">incident</text>

  <!-- stations -->
  <g font-size="12" fill="#e6edf3" text-anchor="middle">
    <g><circle cx="70"  cy="290" r="5" fill="#68d391"/><text x="70"  y="356">Keystroke</text></g>
    <g><circle cx="198" cy="290" r="5" fill="#74cf86"/><text x="198" y="356">Synth</text></g>
    <g><circle cx="326" cy="290" r="5" fill="#b5c24a"/><text x="326" y="356">Commit / CI</text></g>
    <g><circle cx="455" cy="290" r="5" fill="#ffc700"/><text x="455" y="356">Preview</text></g>
    <g><circle cx="582" cy="290" r="5" fill="#fa984a"/><text x="582" y="356">Apply</text></g>
    <g><circle cx="710" cy="290" r="5" fill="#f56565"/><text x="710" y="356">Cloud</text></g>
  </g>

  <!-- zone brackets -->
  <path d="M70,378 L198,378 M70,374 L70,382 M198,374 L198,382" stroke="#68d391" stroke-width="1.5"/>
  <text x="134" y="397" font-size="11.5" fill="#7ee0a3" text-anchor="middle">offline — no cloud, no credentials</text>
  <path d="M455,378 L455,386" stroke="#e0b84a" stroke-width="1.5"/>
  <text x="455" y="399" font-size="11.5" fill="#e0b84a" text-anchor="middle">first cloud / state contact</text>

  <!-- formae split lane -->
  <text x="40" y="445" font-size="13" font-weight="700" fill="#be82fa">formae</text>
  <text x="40" y="461" font-size="10.5" fill="#cbb0f5">agentic, no state file</text>
  <line x1="198" y1="445" x2="710" y2="445" stroke="#be82fa" stroke-width="2" stroke-dasharray="5 4"/>
  <g fill="#be82fa">
    <circle cx="198" cy="445" r="6"/>
    <circle cx="710" cy="445" r="6"/>
  </g>
  <text x="198" y="431" font-size="11" fill="#cbb0f5" text-anchor="middle">PKL types · local</text>
  <text x="710" y="431" font-size="11" fill="#cbb0f5" text-anchor="middle">reconcile · live</text>
  <text x="454" y="438" font-size="10.5" fill="#a385d0" text-anchor="middle">no preview in between</text>

  <!-- footnote -->
  <text x="40" y="495" font-size="11" fill="#8b949e">* Pulumi runs a real language at synth, but its preview still needs the engine and state.</text>
</svg>
