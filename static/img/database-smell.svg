<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 356" font-family="-apple-system, Segoe UI, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="amberhead" markerWidth="9" markerHeight="9" refX="4" refY="4" orient="auto-start-reverse" markerUnits="strokeWidth">
      <path d="M0,0 L6,4 L0,8 Z" fill="#e0b84a"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="900" height="356" fill="#0d1117"/>

  <text x="40" y="46" font-size="22" font-weight="700" fill="#e6edf3">Requiring a database is a design smell</text>
  <text x="40" y="72" font-size="13" fill="#8b949e">The truth already exists in the cloud. A second copy you must keep correct is the state file&#8217;s burden again.</text>

  <!-- the smell -->
  <rect x="40" y="98" width="500" height="218" rx="10" fill="#161b22" stroke="#e0b84a" stroke-width="1.4" stroke-dasharray="5 4"/>
  <text x="290" y="126" font-size="12.5" font-weight="600" fill="#e0b84a" text-anchor="middle">ConfigHub and formae both require one</text>

  <!-- required store cylinder -->
  <ellipse cx="140" cy="180" rx="36" ry="10" fill="#1b2230" stroke="#e0b84a" stroke-width="1.8"/>
  <line x1="104" y1="180" x2="104" y2="214" stroke="#e0b84a" stroke-width="1.8"/>
  <line x1="176" y1="180" x2="176" y2="214" stroke="#e0b84a" stroke-width="1.8"/>
  <path d="M104,214 A36,10 0 0 0 176,214" fill="none" stroke="#e0b84a" stroke-width="1.8"/>
  <path d="M104,193 A36,10 0 0 0 176,193" fill="none" stroke="#e0b84a" stroke-width="1" opacity="0.5"/>
  <path d="M104,204 A36,10 0 0 0 176,204" fill="none" stroke="#e0b84a" stroke-width="1" opacity="0.5"/>
  <text x="140" y="242" font-size="12" font-weight="600" fill="#adbac7" text-anchor="middle">a required store</text>

  <!-- reconcile arrows -->
  <line x1="200" y1="192" x2="332" y2="192" stroke="#e0b84a" stroke-width="2" marker-start="url(#amberhead)" marker-end="url(#amberhead)"/>
  <path d="M266,164 l14,22 h-28 z" fill="#161b22" stroke="#f56565" stroke-width="1.4"/>
  <text x="266" y="182" font-size="12" font-weight="700" fill="#f56565" text-anchor="middle">!</text>

  <!-- live system cloud -->
  <path d="M368,206 a13,13 0 0 1 0,-24 a16,16 0 0 1 30,-4 a12,12 0 0 1 15,6 a12,12 0 0 1 -3,22 z" fill="#161b22" stroke="#8b949e" stroke-width="1.8"/>
  <text x="393" y="242" font-size="12" font-weight="600" fill="#adbac7" text-anchor="middle">the live system</text>

  <text x="290" y="290" font-size="12.5" fill="#c9d1d9" text-anchor="middle">Two truths to keep in sync, and a server to run before your first resource.</text>

  <!-- chant -->
  <rect x="560" y="98" width="300" height="218" rx="10" fill="#1a9850" opacity="0.08"/>
  <rect x="560" y="98" width="300" height="218" rx="10" fill="none" stroke="#1a9850" stroke-width="2"/>
  <text x="710" y="126" font-size="12.5" font-weight="700" fill="#68d391" text-anchor="middle">chant requires none</text>
  <path d="M687,206 a14,14 0 0 1 0,-26 a17,17 0 0 1 32,-4 a13,13 0 0 1 16,7 a13,13 0 0 1 -3,23 z" fill="#12261a" stroke="#1a9850" stroke-width="2"/>
  <text x="712" y="196" font-size="12.5" font-weight="700" fill="#68d391" text-anchor="middle">{ TS }</text>
  <text x="712" y="242" font-size="12" font-weight="600" fill="#adbac7" text-anchor="middle">the live system, git for history</text>
  <text x="710" y="290" font-size="12.5" fill="#d6f5e2" text-anchor="middle">One truth. Add a database only at</text>
  <text x="710" y="308" font-size="12.5" fill="#d6f5e2" text-anchor="middle">scale, as an index, never a dependency.</text>
</svg>
