<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 488" font-family="-apple-system, Segoe UI, Helvetica, Arial, sans-serif">
  <rect x="0" y="0" width="900" height="488" fill="#0d1117"/>

  <text x="40" y="44" font-size="22" font-weight="700" fill="#e6edf3">Honor the lower layer</text>
  <text x="40" y="68" font-size="13" fill="#8b949e">Gregor Hohpe is a software architect at AWS. Adam Chlipala works on formal verification at MIT. They describe the same rule.</text>

  <!-- circle A: Hohpe -->
  <circle cx="365" cy="286" r="164" fill="#58a6ff" fill-opacity="0.10" stroke="#58a6ff" stroke-opacity="0.8" stroke-width="1.5"/>
  <!-- circle B: Chlipala -->
  <circle cx="535" cy="286" r="164" fill="#e0b84a" fill-opacity="0.10" stroke="#e0b84a" stroke-opacity="0.8" stroke-width="1.5"/>

  <text x="240" y="150" font-size="16" font-weight="700" fill="#79c0ff" text-anchor="middle">Gregor Hohpe</text>
  <text x="240" y="169" font-size="11" fill="#8b949e" text-anchor="middle">software architecture &#183; AWS</text>

  <text x="660" y="150" font-size="16" font-weight="700" fill="#e0b84a" text-anchor="middle">Adam Chlipala</text>
  <text x="660" y="169" font-size="11" fill="#b0894a" text-anchor="middle">formal verification &#183; MIT</text>

  <!-- A only -->
  <text x="264" y="280" font-size="13" font-weight="600" fill="#cfe3ff" text-anchor="middle">compiler, not illusion</text>
  <text x="264" y="302" font-size="10.5" fill="#8b949e" text-anchor="middle">stay up top, never read the output</text>

  <!-- B only -->
  <text x="636" y="280" font-size="13" font-weight="600" fill="#f0d488" text-anchor="middle">abstraction, not fiction</text>
  <text x="636" y="302" font-size="10.5" fill="#b0894a" text-anchor="middle">C and Rust are expensive fictions</text>

  <!-- center: the rule -->
  <rect x="368" y="255" width="164" height="62" rx="10" fill="#1a9850" fill-opacity="0.12" stroke="#1a9850" stroke-width="1.5"/>
  <text x="450" y="280" font-size="11.5" font-weight="700" fill="#e6edf3" text-anchor="middle">good only while it</text>
  <text x="450" y="298" font-size="11.5" font-weight="700" fill="#7ee787" text-anchor="middle">honors the layer below</text>

  <text x="40" y="470" font-size="11" fill="#6e7681">Different words for one failure: Hohpe&#8217;s illusion is Chlipala&#8217;s fiction. The winner is the abstraction you build on and leave the lower layer alone.</text>
</svg>
