<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 400" font-family="-apple-system, Segoe UI, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="ar" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L6,3 L0,6 Z" fill="#c9d1d9"/>
    </marker>
    <marker id="arA" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L6,3 L0,6 Z" fill="#8b949e"/>
    </marker>
  </defs>

  <text x="40" y="44" font-size="22" font-weight="700" fill="#e6edf3">The agentic ops loop</text>
  <text x="40" y="70" font-size="13" fill="#8b949e">An agent proposes, chant checks, a human approves, Temporal applies durably.</text>

  <!-- Agent -->
  <rect x="40" y="150" width="170" height="78" rx="10" fill="#8b949e" fill-opacity="0.06" stroke="#8b949e" stroke-width="1.6"/>
  <text x="125" y="185" font-size="16" font-weight="700" fill="#e6edf3" text-anchor="middle">Agent</text>
  <text x="125" y="207" font-size="12" fill="#8b949e" text-anchor="middle">proposes a change</text>

  <!-- chant -->
  <rect x="270" y="150" width="190" height="78" rx="10" fill="#68d391" fill-opacity="0.07" stroke="#68d391" stroke-width="1.6"/>
  <text x="365" y="185" font-size="16" font-weight="700" fill="#68d391" text-anchor="middle">chant</text>
  <text x="365" y="207" font-size="12" fill="#8b949e" text-anchor="middle">lint + diff, checkable first</text>

  <!-- Human -->
  <rect x="520" y="150" width="170" height="78" rx="10" fill="#e0b84a" fill-opacity="0.07" stroke="#e0b84a" stroke-width="1.6"/>
  <text x="605" y="185" font-size="16" font-weight="700" fill="#e0b84a" text-anchor="middle">Human</text>
  <text x="605" y="207" font-size="12" fill="#8b949e" text-anchor="middle">approves at the gate</text>

  <!-- Temporal -->
  <rect x="750" y="150" width="190" height="78" rx="10" fill="#818cf8" fill-opacity="0.09" stroke="#818cf8" stroke-width="1.6"/>
  <text x="845" y="185" font-size="16" font-weight="700" fill="#a5b4fc" text-anchor="middle">Temporal</text>
  <text x="845" y="207" font-size="12" fill="#8b949e" text-anchor="middle">durable apply, resumes on crash</text>

  <!-- arrows between -->
  <line x1="210" y1="189" x2="264" y2="189" stroke="#c9d1d9" stroke-width="2" marker-end="url(#ar)"/>
  <line x1="460" y1="189" x2="514" y2="189" stroke="#c9d1d9" stroke-width="2" marker-end="url(#ar)"/>
  <line x1="690" y1="189" x2="744" y2="189" stroke="#c9d1d9" stroke-width="2" marker-end="url(#ar)"/>

  <!-- return arrow -->
  <path d="M845,228 L845,300 L125,300 L125,232" fill="none" stroke="#8b949e" stroke-width="1.8" stroke-dasharray="5 5" marker-end="url(#arA)"/>
  <text x="485" y="322" font-size="12" fill="#8b949e" text-anchor="middle">observe the live system</text>

  <!-- footnote -->
  <text x="40" y="374" font-size="12" fill="#6e7681">The gate is judgment. Everything else is execution, and execution is what agents do.</text>
</svg>
